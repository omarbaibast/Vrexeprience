<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>UWC VR Social Hub</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  </head>
  <body>
    <a-scene vr-mode-ui="enabled: true" gamepad-controls="enabled: true">
      <!-- Floor -->
      <a-plane rotation="-90 0 0" width="30" height="30" color="#228B22"></a-plane>

      <!-- Lighting -->
      <a-entity light="type: ambient; color: #fff"></a-entity>
      <a-entity light="type: directional; intensity: 0.6" position="1 2 1"></a-entity>

      <!-- Player camera -->
      <a-entity id="player" camera look-controls wasd-controls position="0 1.6 5">
        <a-entity cursor="fuse: false; rayOrigin: mouse" raycaster="objects: .interactive"></a-entity>
      </a-entity>

      <!-- Sample avatar cubes to represent other students -->
      <a-box position="2 0.5 -3" color="#2194ce" depth="1" height="1" width="1"></a-box>
      <a-box position="-2 0.5 -2" color="#f4a261" depth="1" height="1" width="1"></a-box>

      <!-- Mini-game: bouncing ball -->
      <a-sphere id="ball" position="0 0.3 -2" radius="0.3" color="#ff0000"></a-sphere>

      <!-- Sky -->
      <a-sky color="#87ceeb"></a-sky>
    </a-scene>

    <script>
      // Bouncing ball animation
      const ball = document.querySelector('#ball');
      let dir = 0.03;
      function animate() {
        ball.object3D.position.y += dir;
        if (ball.object3D.position.y > 2 || ball.object3D.position.y < 0.3) dir *= -1;
        requestAnimationFrame(animate);
      }
      animate();
    </script>
  </body>
</html>
